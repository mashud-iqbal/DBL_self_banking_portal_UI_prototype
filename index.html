<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhaka Bank Self Banking Portal</title>
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        db: {
                            blue: '#004da3',       
                            bluelight: '#94b4e0',  
                            teal: '#2596be',       
                            teallight: '#2595d3',  
                            navy: '#002855',       
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        bn: ['Anek Bangla', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Base styling - Strict No Scroll */
        body { background-color: #f8fafc; overflow: hidden; margin: 0; padding: 0; height: 100vh; }

        /* Hide scrollbars for form elements if they overflow slightly on tiny screens */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Dynamic Engine Transition Classes */
        .mount-point {
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 1;
            transform: translateY(0);
        }
        .mount-point.fade-out {
            opacity: 0;
            transform: translateY(15px);
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- === MAIN APP STAGE (Managed by Core) === -->
    <!-- ========================================== -->
    <div id="main-stage" class="mount-point w-full h-full">
        <!-- The Core Engine injects the entire page UI here -->
    </div>

    <!-- Scripts -->
    <script>
        // ==========================================
        // 0. GLOBAL LAYOUT WRAPPER 
        // Generates the standard split-screen UI for modules
        // ==========================================
        const Layout = {
            wrap: function(leftContent, rightContent) {
                return `
                    <div class="flex flex-col lg:flex-row w-full h-screen bg-slate-50 overflow-hidden relative">
                        
                        <!-- LEFT PANEL -->
                        <div class="w-full lg:w-[45%] relative flex flex-col justify-between p-8 lg:p-12 overflow-hidden z-10 shrink-0 bg-gradient-to-br from-db-blue to-db-navy">
                            
                            <!-- Subtle Background Overlay -->
                            <div class="absolute inset-0 opacity-10 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1400')] bg-cover mix-blend-overlay z-0"></div>
                            
                            <!-- Premium Corporate Fintech Motif -->
                            <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
                                <div class="absolute -top-32 -right-32 w-[600px] h-[600px] lg:w-[800px] lg:h-[800px] bg-db-teal/10 rounded-full blur-[100px] opacity-70"></div>
                                <div class="absolute -bottom-32 -left-32 w-[500px] h-[500px] lg:w-[700px] lg:h-[700px] bg-db-bluelight/10 rounded-full blur-[100px] opacity-50"></div>
                                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] lg:w-[800px] lg:h-[800px] border border-white/[0.03] rounded-full"></div>
                                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[900px] h-[900px] lg:w-[1200px] lg:h-[1200px] border border-white/[0.02] rounded-full shadow-[inset_0_0_100px_rgba(255,255,255,0.01)]"></div>
                                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[1200px] h-[1200px] lg:w-[1600px] lg:h-[1600px] border border-db-teal/[0.03] rounded-full"></div>
                                <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/[0.015] to-transparent transform -skew-y-12 scale-150 pointer-events-none"></div>
                            </div>

                            <!-- Left Logo -->
                            <div class="relative z-10 flex justify-start">
                                <!-- Left Logo -->
							<div class="relative z-10 flex justify-start">
								<div onclick="Core.navigate('dashboard')" class="bg-white px-4 py-2.5 rounded-xl shadow-lg border border-white/10 flex items-center justify-center cursor-pointer hover:bg-slate-50 transition-colors">
									<img src="https://i.ibb.co.com/wh3H9sMQ/Logo-of-Dhaka-Bank-svg.png" alt="Dhaka Bank" class="h-8 object-contain" />
								</div>
							</div>
                            </div>

                            <!-- Left Dynamic Content -->
                            <div class="relative z-10 mt-auto mb-auto w-full">
                                ${leftContent}
                            </div>
                        </div>

                        <!-- RIGHT PANEL -->
                        <div class="w-full lg:w-[55%] p-6 lg:p-10 flex flex-col justify-center bg-slate-50 h-full overflow-hidden relative z-0">
                            
                            <!-- Right Logo -->
                            <div class="hidden lg:flex justify-end absolute top-4 right-10 z-20 pointer-events-none">
                                 <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 flex items-center justify-center pointer-events-auto">
                                    <img src="https://i.ibb.co.com/1fdxMJKM/self-banking-logo.png" alt="Self Banking" class="h-8 object-contain" />
                                </div>
                            </div>

                            <!-- Right Dynamic Content -->
                            <div class="max-w-3xl mx-auto w-full relative z-10 flex flex-col mt-20 lg:mt-24 h-full justify-center">
                                ${rightContent}
                            </div>
                        </div>
                    </div>
                `;
            }
        };
		


        // ==========================================
        // 1. MODULE REGISTRY (Store all UI components here)
        // ==========================================
        const Registry = {

  // ==========================================
    // MODULE: SPLASH SCREEN (LOADING ANIMATION)
    // ==========================================
// ==========================================
    // MODULE: SPLASH SCREEN (LOADING ANIMATION)
    // ==========================================
    'splash': {
        render: function() {
            return `
                <div class="flex items-center justify-center w-full h-screen bg-slate-50 relative overflow-hidden fade-in">
                    
                    <!-- Sliding Blue Panel (Matches Dashboard Left Panel for Seamless Transition) -->
                    <div id="splash-blue-panel" class="absolute top-0 left-0 w-full lg:w-[45%] h-full bg-gradient-to-br from-db-blue to-db-navy transition-transform duration-[1200ms] ease-in-out -translate-x-full overflow-hidden z-0">
                        <!-- Subtle Background Overlay -->
                        <div class="absolute inset-0 opacity-10 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1400')] bg-cover mix-blend-overlay z-0"></div>
                        
                        <!-- Premium Corporate Fintech Motif -->
                        <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
                            <div class="absolute -top-32 -right-32 w-[600px] h-[600px] lg:w-[800px] lg:h-[800px] bg-db-teal/10 rounded-full blur-[100px] opacity-70"></div>
                            <div class="absolute -bottom-32 -left-32 w-[500px] h-[500px] lg:w-[700px] lg:h-[700px] bg-db-bluelight/10 rounded-full blur-[100px] opacity-50"></div>
                            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] lg:w-[800px] lg:h-[800px] border border-white/[0.03] rounded-full"></div>
                            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[900px] h-[900px] lg:w-[1200px] lg:h-[1200px] border border-white/[0.02] rounded-full shadow-[inset_0_0_100px_rgba(255,255,255,0.01)]"></div>
                            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[1200px] h-[1200px] lg:w-[1600px] lg:h-[1600px] border border-db-teal/[0.03] rounded-full"></div>
                            <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/[0.015] to-transparent transform -skew-y-12 scale-150 pointer-events-none"></div>
                        </div>
                    </div>

                    <!-- Pulsing Loading Text -->
                    <div id="splash-text" class="absolute bottom-1/3 left-1/2 transform -translate-x-1/2 text-db-navy font-bold tracking-widest text-xs uppercase opacity-100 transition-opacity duration-500 animate-pulse z-20">
                        Initializing Banking Portal...
                    </div>

                    <!-- Full Screen Animation Container -->
                    <div class="absolute inset-0 w-full h-full pointer-events-none z-30">
                        
                        <!-- Dhaka Bank Logo -->
                        <div id="splash-db-logo" class="absolute transition-all duration-[1200ms] ease-in-out" style="top: 50%; left: 50%; transform: translate(-110%, -50%);">
                            <div id="splash-db-box" class="bg-white px-4 py-2.5 rounded-xl shadow-lg border border-slate-200 transition-colors duration-[1200ms] flex items-center justify-center">
                                <img src="https://i.ibb.co.com/wh3H9sMQ/Logo-of-Dhaka-Bank-svg.png" alt="Dhaka Bank" class="h-8 object-contain" />
                            </div>
                        </div>
                        
                        <!-- Self Banking Logo (Hidden on mobile to match dashboard) -->
                        <div id="splash-sb-logo" class="absolute transition-all duration-[1200ms] ease-in-out hidden lg:block" style="top: 50%; left: 50%; transform: translate(10%, -50%);">
                            <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 flex items-center justify-center">
                                <img src="https://i.ibb.co.com/1fdxMJKM/self-banking-logo.png" alt="Self Banking" class="h-8 object-contain" />
                            </div>
                        </div>
                        
                    </div>
                </div>
            `;
        },
        init: function() {
            // 1. Trigger the "move to corners" animation after 800ms
            setTimeout(() => {
                const dbLogo = document.getElementById('splash-db-logo');
                const sbLogo = document.getElementById('splash-sb-logo');
                const dbBox = document.getElementById('splash-db-box');
                const text = document.getElementById('splash-text');
                const bluePanel = document.getElementById('splash-blue-panel');
                
                if (text) text.style.opacity = '0'; // Fade out the loading text
                
                if (bluePanel) {
                    bluePanel.style.transform = 'translateX(0)'; // Slide in the blue panel
                }
                
                if (dbLogo && sbLogo) {
                    // Move Dhaka Bank logo to Top Left (matches lg:p-12 -> 3rem)
                    dbLogo.style.top = '3rem'; 
                    dbLogo.style.left = '3rem'; 
                    dbLogo.style.transform = 'translate(0, 0)'; 
                    
                    // Transition border color to match the dashboard's white/10 over blue background
                    if (dbBox) {
                        dbBox.classList.remove('border-slate-200');
                        dbBox.classList.add('border-white/10');
                    }
                    
                    // Move Self Banking logo to Top Right (matches top-8 -> 2rem, right-10 -> 2.5rem)
                    sbLogo.style.top = '2rem'; 
                    sbLogo.style.left = 'calc(100% - 2.5rem)'; 
                    sbLogo.style.transform = 'translate(-100%, 0)';
                }
            }, 800);

            // 2. After 2.8 seconds total, transition smoothly into the main Dashboard
            setTimeout(() => {
                Core.navigate('dashboard');
            }, 2800);
        }
    },        
 // --- MODULE: DASHBOARD ---
    'dashboard': {
        render: function() {
            const leftHTML = `
                <div class="flex flex-col items-start w-full h-full fade-in antialiased">
                    <p class="font-bn text-xl lg:text-2xl font-semibold italic text-db-bluelight/90 mb-2 tracking-wider mt-12 lg:mt-20">
                        আপনার সময়ের মূল্য আমরা বুঝি,
                    </p>
                    <h1 class="font-bn text-4xl lg:text-[3.5rem] font-black italic text-white/95 leading-[1.1] tracking-tight drop-shadow-sm mb-6">
                        তাই লাইনে না দাঁড়িয়েই
                    </h1>
                    
                    <div class="inline-flex items-center gap-4 bg-white/[0.08] backdrop-blur-xl border border-white/10 rounded-full px-6 py-2.5 shadow-2xl mb-6">
                        <div class="bg-db-teal/20 p-2.5 rounded-full border border-db-teal/20">
                            <i data-lucide="zap" class="w-5 h-5 text-db-teallight"></i>
                        </div>
                        <div class="font-bn text-2xl lg:text-4xl text-db-teal font-extrabold flex items-center tracking-tight">
                            <div class="h-[36px] lg:h-[50px] overflow-hidden relative min-w-[200px] lg:min-w-[280px]">
                                <div id="ticker-track" class="flex flex-col transition-transform duration-500 ease-in-out">
                                    <div class="ticker-item h-[36px] lg:h-[50px] flex items-center whitespace-nowrap">সকল ব্যাংকিং সেবা</div>
                                    <div class="ticker-item h-[36px] lg:h-[50px] flex items-center whitespace-nowrap">এফডিআর একাউন্ট (FDR)</div>
                                    <div class="ticker-item h-[36px] lg:h-[50px] flex items-center whitespace-nowrap">ডিপিএস স্কিম (DPS)</div>
                                    <div class="ticker-item h-[36px] lg:h-[50px] flex items-center whitespace-nowrap">এসডিএস স্কিম (SDS)</div>
                                    <div class="ticker-item h-[36px] lg:h-[50px] flex items-center whitespace-nowrap">কার্ড আবেদন ও সেবা</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <h1 class="font-bn text-4xl lg:text-[3.5rem] font-black italic text-white/95 leading-[1.1] tracking-tight drop-shadow-sm mb-10">
                        এখন আপনার হাতের মুঠোয়
                    </h1>
                    
                    <!-- Premium Deposit Rate Button -->
                    <div class="mt-auto w-full pt-8 border-t border-white/10">
                        <p class="text-db-bluelight/80 text-[11px] font-bold uppercase tracking-[0.2em] mb-3"></p>
                        <button onclick="Core.navigate('rates')" class="w-full sm:w-auto bg-white/[0.05] hover:bg-white/[0.12] border border-white/10 backdrop-blur-xl text-white font-extrabold tracking-wide uppercase rounded-xl text-[12px] px-8 py-4 transition-all shadow-lg flex items-center justify-center sm:justify-start gap-3 group">
                            <i data-lucide="bar-chart-3" class="w-5 h-5 text-db-teal group-hover:scale-110 transition-transform"></i> Check Deposit Rates
                        </button>
                    </div>
                </div>
            `;

            const rightHTML = `
                <div class="flex flex-col w-full h-full justify-center fade-in antialiased">
                    <div class="mb-8 lg:mb-10 text-center lg:text-left">
                        <h2 class="font-sans text-3xl lg:text-[2.25rem] font-black text-slate-800 tracking-tighter leading-tight">How can we assist you today?</h2>
                        <p class="font-sans text-slate-500 mt-3 text-sm font-medium tracking-wide">Select a service category to manage your banking needs securely, without waiting in the queue.</p>
                    </div>
                    
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 lg:gap-5 pb-4">
                        <button data-target="fdr" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="landmark" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors">Open FDR</h3>
                        </button>
                        
                        <button data-target="dps" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="coins" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors">Open DPS</h3>
                        </button>
                        
                        <button data-target="sds" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="layers" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors">Open SDS</h3>
                        </button>
                        
                        <button data-target="card-apply" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="credit-card" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors">Apply for Card</h3>
                        </button>
                        
                        <button data-target="card-activate" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="power" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors">Activate Card</h3>
                        </button>
                        
                        <button data-target="tax" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="receipt" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors leading-snug">Submit Tax<br/>Documents</h3>
                        </button>
                        
                        <button data-target="eform" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="file-text" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors leading-snug">Submit<br/>E-Form C</h3>
                        </button>
                        
                        <button data-target="nid" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="id-card" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors">Submit NID</h3>
                        </button>
                        
                        <button data-target="support" class="service-btn col-span-1 group bg-white rounded-[1.5rem] p-5 lg:p-6 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center gap-3.5 hover:-translate-y-1 hover:bg-db-blue hover:border-db-blue cursor-pointer">
                            <div class="w-14 h-14 rounded-[1rem] bg-slate-50 group-hover:bg-white/10 flex items-center justify-center transition-colors shadow-inner shrink-0 border border-slate-100 group-hover:border-white/20"><i data-lucide="headphones" class="w-6 h-6 text-db-blue group-hover:text-white stroke-[2.5] transition-colors"></i></div>
                            <h3 class="font-sans font-extrabold text-slate-700 group-hover:text-white text-[13px] tracking-tight transition-colors">Call Center</h3>
                        </button>
                    </div>
                </div>
            `;

            return Layout.wrap(leftHTML, rightHTML);
        },
        init: function() {
            // Start vertical ticker logic
            const tickerTrack = document.getElementById('ticker-track');
            const tickerItems = document.querySelectorAll('.ticker-item');
            let currentTick = 0;
            if(Core.state.tickerInterval) clearInterval(Core.state.tickerInterval);
            
            Core.state.tickerInterval = setInterval(() => {
                if(!tickerTrack) return;
                currentTick = (currentTick + 1) % tickerItems.length;
                const itemHeight = tickerItems[0].clientHeight; 
                tickerTrack.style.transform = `translateY(-${currentTick * itemHeight}px)`;
            }, 3000);

            // Bind Service Buttons to Routing Engine
            document.querySelectorAll('.service-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    Core.navigate(btn.getAttribute('data-target'));
                });
            });
        }
    },
// ==========================================
    // MODULE: DEPOSIT RATES & UNIVERSAL CALCULATOR
    // ==========================================
// ==========================================
    // MODULE: DEPOSIT RATES & UNIVERSAL CALCULATOR
    // ==========================================
    'rates': {
        render: function() {

        init: function() {
            const productSel = document.getElementById('univ-product');
            const tenureSel = document.getElementById('univ-tenure');
            const amtInput = document.getElementById('univ-amount');
            const rateLabel = document.getElementById('univ-rate');
            const matLabel = document.getElementById('univ-mat');
            const matTitle = document.getElementById('univ-mat-label');
            const amtTitle = document.getElementById('univ-amount-label');

            const tenures = {
                fdr: [
                    {val: '1', text: '1 Month'},
                    {val: '3', text: '3 Months'},
                    {val: '6', text: '6 Months'},
                    {val: '12', text: '12 Months'},
                    {val: '24', text: '24 Months'}
                ],
                dps: [
                    {val: '2', text: '2 Years'},
                    {val: '3', text: '3 Years'},
                    {val: '5', text: '5 Years'},
                    {val: '10', text: '10 Years'}
                ],
                sds: [
                    {val: '1', text: '1 Year'},
                    {val: '2', text: '2 Years'},
                    {val: '3', text: '3 Years'}
                ]
            };

            const populateTenures = () => {
                const prod = productSel.value;
                tenureSel.innerHTML = tenures[prod].map(t => `<option value="${t.val}">${t.text}</option>`).join('');
                
                // Adjust Labels
                if (prod === 'dps') {
                    amtTitle.innerText = "Monthly Installment";
                    matTitle.innerText = "Maturity Value";
                } else if (prod === 'sds') {
                    amtTitle.innerText = "Deposit Amount";
                    matTitle.innerText = "Monthly Profit";
                } else {
                    amtTitle.innerText = "Deposit Amount";
                    matTitle.innerText = "Maturity Value";
                }
            };

            const calculate = () => {
                const prod = productSel.value;
                const t = parseInt(tenureSel.value);
                const amt = parseFloat(amtInput.value) || 0;
                let rate = 0;
                let maturity = 0;

                if (prod === 'fdr') {
                    if (t <= 3) rate = 5.0;
                    else if (t === 6) rate = 7.0;
                    else if (t >= 12) rate = 9.5;
                    
                    if (amt < 100000) rate -= 1.0;
                    if (amt >= 500000) rate += 0.5;
                    rate = Math.max(4.0, Math.min(9.5, rate));

                    const timeInYears = t / 12;
                    maturity = amt + (amt * (rate / 100) * timeInYears);
                } 
                else if (prod === 'dps') {
                    if (t === 2) rate = 5.0;
                    else if (t >= 3 && t <= 4) rate = 6.5;
                    else if (t >= 5 && t <= 7) rate = 9.5;
                    else if (t >= 8) rate = 8.5;

                    if (amt < 5000) rate -= 1.0;
                    if (amt >= 10000) rate += 0.5;
                    rate = Math.max(4.0, Math.min(9.5, rate));

                    const n = t * 12; 
                    const totalDeposit = amt * n;
                    const totalInterest = amt * (n * (n + 1)) / 2 * (rate / 100 / 12);
                    maturity = totalDeposit + totalInterest;
                }
                else if (prod === 'sds') {
                    rate = 9.6; // Flat for SDS
                    maturity = (amt * (rate / 100)) / 12; // Monthly profit
                }

                rateLabel.innerText = rate.toFixed(2) + '%';
                matLabel.innerText = '৳ ' + maturity.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2});
            };

            // Event Listeners
            productSel.addEventListener('change', () => { populateTenures(); calculate(); });
            tenureSel.addEventListener('change', calculate);
            amtInput.addEventListener('input', calculate);

            // Initialize
            populateTenures();
            calculate();
        }
    },

'fdr': {
    state: {
        step: 1, // 1: T&C, 2: Source, 3: Product, 4: Summary, 5: Confirmation
        accountNo: '',
        amount: '',
        tenure: '',
        branch: '',
        maturityOption: '',

    // Real-time calculation logic
    calculateFDR: function() {
        let rate = 6.0;
        const t = parseInt(this.state.tenure);
        const amt = parseFloat(this.state.amount) || 0;

        // Base rate based on tenure
        if (t <= 3) rate = 5.0;
        else if (t === 6) rate = 7.0;
        else if (t === 12) rate = 9.5;
        else if (t > 12) rate = 8.5;

        // Adjustments based on deposit amount
        if (amt < 100000) rate -= 1.0;
        if (amt >= 500000) rate += 0.5;

        // Cap bounds between 4.0% and 9.5%
        rate = Math.max(4.0, Math.min(9.5, rate));
        this.state.interestRate = rate;

        // Indicative calculation
        const timeInYears = t / 12;
        const interest = amt * (rate / 100) * timeInYears;
        this.state.maturityAmount = amt + interest;
    },

    nextStep: function(targetStep) {
        this.state.step = targetStep;
        Core.render(); // Re-triggers the UI cycle seamlessly
    },

        if (this.state.step === 3) {

                    this.state.branch = branchSelect.value;
                    this.state.maturityOption = matSelect.value;
                    
                    // Validation Logic for Amount

                    if (this.state.amount !== '') {
                        if (this.state.amount >= 50000 && this.state.amount <= 500000) {

                        }

                        amtError.classList.add('hidden');
                        amtInput.classList.remove('border-db-blue', 'ring-db-blue');
                    }

                    // Validation Logic for Form Completion (All Dropdowns + Valid Amount)
                    const isFormComplete = isAmountValid && this.state.tenure !== '' && this.state.branch !== '' && this.state.maturityOption !== '';
                    
                    if (isFormComplete) {
                        continueBtn.removeAttribute('disabled');

                    const calcAmt = document.getElementById('fdr-calc-amt');
                    const calcRate = document.getElementById('fdr-calc-rate');
                    const calcMat = document.getElementById('fdr-calc-mat');
                    const calcTime = document.getElementById('fdr-calc-time');
                    const calcPrescriptive = document.getElementById('fdr-calc-prescriptive');

                    if (isAmountValid && this.state.tenure !== '') {
                        this.calculateFDR();
                        if (calcAmt) calcAmt.innerText = '৳ ' + this.state.amount.toLocaleString();
                        if (calcRate) calcRate.innerText = this.state.interestRate.toFixed(2) + '%';
                        if (calcMat) calcMat.innerText = '৳ ' + this.state.maturityAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2});
                        if (calcTime) calcTime.innerText = 'in ' + this.state.tenure + ' Months';
                        
                        // Prescriptive Message Logic
                        if (calcPrescriptive) {
                            let maxRate = 9.5;
                            if (this.state.amount < 100000) maxRate -= 1.0;
                            if (this.state.amount >= 500000) maxRate += 0.5;
                            maxRate = Math.max(4.0, Math.min(9.5, maxRate));
                            
                            const diff = (maxRate - this.state.interestRate).toFixed(2);
                            if (diff > 0) {
                                calcPrescriptive.innerHTML = `<i data-lucide="trending-up" class="w-3 h-3 inline mr-1"></i>Select <strong>12 Months</strong> tenure for <strong>${diff}% more</strong> interest rate!`;

                            }
                        }
                    } else {
                        if (calcAmt) calcAmt.innerText = '৳ 0';
                        if (calcRate) calcRate.innerText = '0.00%';
                        if (calcMat) calcMat.innerText = '৳ 0.00';
                        if (calcTime) calcTime.innerText = '';
                        if (calcPrescriptive) calcPrescriptive.classList.add('hidden');
                    }
                };

                tenSelect.addEventListener('change', updateUI);
                branchSelect.addEventListener('change', updateUI);
                matSelect.addEventListener('change', updateUI);
                
                updateUI(); // Run once on init

                        loadIcon.classList.add('hidden');
                        successState.classList.remove('hidden');
                    }, 300);
                }, 1500); // 1.5s simulated loading
            }
        }
    }

    // Real-time calculation logic for DPS
    calculateDPS: function() {
        let rate = 6.0;
        const t = parseInt(this.state.tenure); // tenure in years
        const amt = parseFloat(this.state.amount) || 0;

        // Base rate based on tenure (years)
        if (t === 2) rate = 5.0;
        else if (t >= 3 && t <= 4) rate = 6.5;
        else if (t >= 5 && t <= 7) rate = 9.5;
        else if (t >= 8 && t <= 10) rate = 8.5;

        // Adjustments based on installment amount
        if (amt < 5000) rate -= 1.0;
        if (amt >= 10000) rate += 0.5;

        // Cap bounds between 4.0% and 9.5%
        rate = Math.max(4.0, Math.min(9.5, rate));
        this.state.interestRate = rate;

        // Indicative calculation for DPS (Standard Arithmetic Progression Formula)
        // Total Interest = P * (n * (n + 1)) / 2 * (r / 12)
        const n = t * 12; // total months
        const totalDeposit = amt * n;
        const totalInterest = amt * (n * (n + 1)) / 2 * (rate / 100 / 12);
        this.state.maturityAmount = totalDeposit + totalInterest;
    },

    // Logic that runs after HTML is injected
    init: function() {
        // Step 1: T&C Checkbox Logic
        if (this.state.step === 1) {
            const cb = document.getElementById('dps-agree');
            const btn = document.getElementById('dps-btn-proceed');
            if(cb && btn) {
                cb.addEventListener('change', (e) => {
                    btn.disabled = !e.target.checked;
                    if(e.target.checked) btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    else btn.classList.add('opacity-50', 'cursor-not-allowed');
                });
            }
        }

        // Step 2: OTP Request & Submit Logic
        if (this.state.step === 2) {
            const accInput = document.getElementById('dps-acc-input');
            const reqSection = document.getElementById('otp-request-section');
            const btnReqOtp = document.getElementById('btn-request-otp');
            const subSection = document.getElementById('otp-submit-section');
            const otpInput = document.getElementById('dps-otp');
            const btnSubmitOtp = document.getElementById('btn-submit-otp');
            
            if(accInput && reqSection) {
                // Enable OTP Request Section on valid A/C entry
                accInput.addEventListener('input', (e) => {
                    this.state.accountNo = e.target.value;
                    if(e.target.value.length >= 10) {
                        reqSection.classList.remove('opacity-40', 'pointer-events-none');
                    } else {
                        reqSection.classList.add('opacity-40', 'pointer-events-none');
                        subSection.classList.add('hidden');
                    }
                });
                
                // Show OTP Input field when user requests OTP
                btnReqOtp.addEventListener('click', () => {
                    reqSection.classList.add('hidden');
                    subSection.classList.remove('hidden');
                    setTimeout(() => otpInput.focus(), 100);
                });

                // Enable Proceed Button on valid OTP entry
                otpInput.addEventListener('input', (e) => {
                    if(e.target.value.length === 6) {
                        btnSubmitOtp.classList.remove('opacity-50', 'cursor-not-allowed');
                        btnSubmitOtp.removeAttribute('disabled');
                    } else {
                        btnSubmitOtp.classList.add('opacity-50', 'cursor-not-allowed');
                        btnSubmitOtp.setAttribute('disabled', 'true');
                    }
                });

                // Proceed to next step
                btnSubmitOtp.addEventListener('click', () => {
                    Registry.dps.nextStep(3);
                });
            }
        }

        // Step 3: Real-time Calculator Events & Validation
        if (this.state.step === 3) {
            const amtSelect = document.getElementById('dps-amount');
            const tenSelect = document.getElementById('dps-tenure');
            const branchSelect = document.getElementById('dps-branch');
            const continueBtn = document.getElementById('btn-step3-continue');
            
            if (amtSelect && tenSelect) {
                const updateUI = () => {
                    this.state.amount = amtSelect.value ? parseFloat(amtSelect.value) : '';
                    this.state.tenure = tenSelect.value;
                    this.state.branch = branchSelect.value;
                    
                    // Validation Logic for Form Completion
                    const isFormComplete = this.state.amount !== '' && this.state.tenure !== '' && this.state.branch !== '';
                    
                    if (isFormComplete) {
                        continueBtn.removeAttribute('disabled');
                        continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    } else {
                        continueBtn.setAttribute('disabled', 'true');
                        continueBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    }

                    // Update left panel calculator dynamically
                    const calcAmt = document.getElementById('dps-calc-amt');
                    const calcRate = document.getElementById('dps-calc-rate');
                    const calcMat = document.getElementById('dps-calc-mat');
                    const calcTime = document.getElementById('dps-calc-time');
                    const calcPrescriptive = document.getElementById('dps-calc-prescriptive');

                    if (this.state.amount !== '' && this.state.tenure !== '') {
                        this.calculateDPS();
                        if (calcAmt) calcAmt.innerText = '৳ ' + this.state.amount.toLocaleString();
                        if (calcRate) calcRate.innerText = this.state.interestRate.toFixed(2) + '%';
                        if (calcMat) calcMat.innerText = '৳ ' + this.state.maturityAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2});
                        if (calcTime) calcTime.innerText = 'in ' + this.state.tenure + ' Years';
                        
                        // Prescriptive Message Logic for DPS
                        if (calcPrescriptive) {
                            let maxRate = 9.5;
                            if (this.state.amount < 5000) maxRate -= 1.0;
                            if (this.state.amount >= 10000) maxRate += 0.5;
                            maxRate = Math.max(4.0, Math.min(9.5, maxRate));
                            
                            const diff = (maxRate - this.state.interestRate).toFixed(2);
                            if (diff > 0) {
                                // 5 years gives the highest bracket (9.5 base)
                                calcPrescriptive.innerHTML = `<i data-lucide="trending-up" class="w-3 h-3 inline mr-1"></i>Select <strong>5 Years</strong> tenure for <strong>${diff}% more</strong> interest rate!`;
                                calcPrescriptive.classList.remove('hidden');
                                lucide.createIcons();
                            } else {
                                calcPrescriptive.classList.add('hidden');
                            }
                        }
                    } else {
                        if (calcAmt) calcAmt.innerText = '৳ 0';
                        if (calcRate) calcRate.innerText = '0.00%';
                        if (calcMat) calcMat.innerText = '৳ 0.00';
                        if (calcTime) calcTime.innerText = '';
                        if (calcPrescriptive) calcPrescriptive.classList.add('hidden');
                    }
                };
                
                amtSelect.addEventListener('change', updateUI);
                tenSelect.addEventListener('change', updateUI);
                branchSelect.addEventListener('change', updateUI);
                
                updateUI(); // Run once on init
            }
        }

        // Step 5: Loading to Success Simulation
        if (this.state.step === 5) {
            const loadIcon = document.getElementById('dps-loading');
            const successState = document.getElementById('dps-success');
            if(loadIcon && successState) {
                setTimeout(() => {
                    loadIcon.style.opacity = '0';
                    setTimeout(() => {
                        loadIcon.classList.add('hidden');
                        successState.classList.remove('hidden');
                    }, 300);
                }, 1500); // 1.5s simulated loading
            }
        }
    }
},

        monthlyProfit: 0,
        userName: 'M. Mashud Iqbal'
    },

    // Real-time calculation logic for SDS
    calculateSDS: function() {
        const amt = parseFloat(this.state.amount) || 0;
        this.state.interestRate = 9.6; // Flat interest rate

        // Indicative calculation for SDS (Monthly Profit)
        // Monthly Profit = (Principal * Interest Rate) / 12
        const monthlyInterest = (amt * (this.state.interestRate / 100)) / 12;
        this.state.monthlyProfit = monthlyInterest;
    },

        this.state.step = targetStep;
        Core.render(); // Re-triggers the UI cycle seamlessly

    getRoadmap: function(stepIndex) {
        const steps = ["Source A/C", "Product", "Summary", "Confirm"];
        let html = '<div class="flex items-center justify-between w-full mb-6 relative px-2 shrink-0">';
        html += '<div class="absolute left-6 right-6 top-1/2 -translate-y-1/2 h-1 bg-slate-200 z-0 rounded-full"></div>';
        
        const activeWidth = (stepIndex - 1) * 33.33;
        html += `<div class="absolute left-6 top-1/2 -translate-y-1/2 h-1 bg-db-teal z-0 rounded-full transition-all duration-500" style="width: calc(${activeWidth}% - 1rem)"></div>`;

        steps.forEach((s, idx) => {
            const stepNum = idx + 1;
            const isActive = stepNum <= stepIndex;
            const isCurrent = stepNum === stepIndex;
            const bgClass = isActive ? 'bg-db-teal border-db-teal text-white' : 'bg-white border-slate-300 text-slate-400';
            const ringClass = isCurrent ? 'ring-4 ring-db-teal/20' : '';
            html += `
                <div class="relative z-10 flex flex-col items-center">
                    <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center text-[10px] font-bold ${bgClass} ${ringClass} transition-all duration-300">
                        ${isActive && !isCurrent ? '<i data-lucide="check" class="w-3 h-3"></i>' : stepNum}
                    </div>
                    <span class="absolute top-8 text-[9px] font-bold uppercase tracking-wider ${isActive ? 'text-db-teal' : 'text-slate-400'} whitespace-nowrap">${s}</span>
                </div>
            `;
        });
        html += '</div>';
        return html;
    },

    // Logic that runs after HTML is injected
    init: function() {
        // Step 1: T&C Checkbox Logic
        if (this.state.step === 1) {
            const cb = document.getElementById('sds-agree');
            const btn = document.getElementById('sds-btn-proceed');
            if(cb && btn) {
                cb.addEventListener('change', (e) => {
                    btn.disabled = !e.target.checked;
                    if(e.target.checked) btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    else btn.classList.add('opacity-50', 'cursor-not-allowed');
                });
            }
        }

        // Step 2: OTP Request & Submit Logic
        if (this.state.step === 2) {
            const accInput = document.getElementById('sds-acc-input');
            const reqSection = document.getElementById('otp-request-section');
            const btnReqOtp = document.getElementById('btn-request-otp');
            const subSection = document.getElementById('otp-submit-section');
            const otpInput = document.getElementById('sds-otp');
            const btnSubmitOtp = document.getElementById('btn-submit-otp');
            
            if(accInput && reqSection) {
                // Enable OTP Request Section on valid A/C entry
                accInput.addEventListener('input', (e) => {
                    this.state.accountNo = e.target.value;
                    if(e.target.value.length >= 10) {
                        reqSection.classList.remove('opacity-40', 'pointer-events-none');
                    } else {
                        reqSection.classList.add('opacity-40', 'pointer-events-none');
                        subSection.classList.add('hidden');
                    }
                });
                
                // Show OTP Input field when user requests OTP
                btnReqOtp.addEventListener('click', () => {
                    reqSection.classList.add('hidden');
                    subSection.classList.remove('hidden');
                    setTimeout(() => otpInput.focus(), 100);
                });

                // Enable Proceed Button on valid OTP entry
                otpInput.addEventListener('input', (e) => {
                    if(e.target.value.length === 6) {
                        btnSubmitOtp.classList.remove('opacity-50', 'cursor-not-allowed');
                        btnSubmitOtp.removeAttribute('disabled');
                    } else {
                        btnSubmitOtp.classList.add('opacity-50', 'cursor-not-allowed');
                        btnSubmitOtp.setAttribute('disabled', 'true');
                    }
                });

                // Proceed to next step
                btnSubmitOtp.addEventListener('click', () => {
                    Registry.sds.nextStep(3);
                });
            }
        }

        // Step 3: Real-time Calculator Events & Validation
        if (this.state.step === 3) {
            const amtInput = document.getElementById('sds-amount');
            const amtError = document.getElementById('sds-amt-error');
            const productSelect = document.getElementById('sds-product');
            const branchSelect = document.getElementById('sds-branch');
            const continueBtn = document.getElementById('btn-step3-continue');
            
            if (amtInput && productSelect && branchSelect) {
                const updateUI = () => {
                    const parsedAmt = parseFloat(amtInput.value);
                    this.state.amount = isNaN(parsedAmt) ? '' : parsedAmt;
                    this.state.product = productSelect.value;
                    this.state.branch = branchSelect.value;
                    
                    // Validation Logic for Amount (SDS bounds: 100,000 to 2,500,000)
                    let isAmountValid = false;
                    if (this.state.amount !== '') {
                        if (this.state.amount >= 100000 && this.state.amount <= 2500000) {
                            isAmountValid = true;
                            amtError.classList.add('hidden');
                            amtInput.classList.remove('border-db-blue', 'ring-db-blue');
                        } else {
                            amtError.classList.remove('hidden');
                            amtInput.classList.add('border-db-blue', 'ring-db-blue'); 
                        }
                    } else {
                        amtError.classList.add('hidden');
                        amtInput.classList.remove('border-db-blue', 'ring-db-blue');
                    }

                    // Validation Logic for Form Completion
                    const isFormComplete = isAmountValid && this.state.product !== '' && this.state.branch !== '';
                    
                    if (isFormComplete) {
                        continueBtn.removeAttribute('disabled');
                        continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    } else {
                        continueBtn.setAttribute('disabled', 'true');
                        continueBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    }

                    // Update left panel calculator dynamically
                    const calcAmt = document.getElementById('sds-calc-amt');
                    const calcMat = document.getElementById('sds-calc-mat');

                    if (isAmountValid) {
                        this.calculateSDS();
                        if (calcAmt) calcAmt.innerText = '৳ ' + this.state.amount.toLocaleString();
                        if (calcMat) calcMat.innerText = '৳ ' + this.state.monthlyProfit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2});
                    } else {
                        if (calcAmt) calcAmt.innerText = '৳ 0';
                        if (calcMat) calcMat.innerText = '৳ 0.00';
                    }
                };
                
                amtInput.addEventListener('input', updateUI);
                productSelect.addEventListener('change', updateUI);
                branchSelect.addEventListener('change', updateUI);
                
                updateUI(); // Run once on init
            }
        }

        // Step 5: Loading to Success Simulation
        if (this.state.step === 5) {
            const loadIcon = document.getElementById('sds-loading');
            const successState = document.getElementById('sds-success');
            if(loadIcon && successState) {
                setTimeout(() => {
                    loadIcon.style.opacity = '0';
                    setTimeout(() => {
                        loadIcon.classList.add('hidden');
                        successState.classList.remove('hidden');
                    }, 300);
                }, 1500); // 1.5s simulated loading
            }
        }
    }

        const Core = {
            state: {
                lang: 'EN',
                tickerInterval: null
            },
            
            currentPage: null,

            // Navigation method to swap modules
            navigate: function(pageId) {
                if (this.currentPage === pageId && document.getElementById('main-stage').innerHTML.trim() !== "") return;
                this.currentPage = pageId;
                this.render();
            },

            // Global render cycle
            render: function() {
                const stage = document.getElementById('main-stage');
                
                // 1. Fetch Module from Registry (Fallback to Dashboard)
                if (!Registry[this.currentPage]) {
                    console.warn(`Module [${this.currentPage}] not found.`);
                    this.currentPage = 'dashboard';
                }
                const module = Registry[this.currentPage];

                // 2. Fade Out Current View
                stage.classList.add('fade-out');

                // 3. Wait for animation, Inject UI, Fade In
                setTimeout(() => {
                    
                    if (module && module.render) {
                        stage.innerHTML = module.render();
                        
                        // Re-initialize Icons
                        lucide.createIcons();
                        
                        // Run module-specific initialization (events, sliders, etc.)
                        if (module.init) module.init(); 
                    } else {
                        stage.innerHTML = `
                            <div class="p-10 text-center pt-40 text-slate-300 w-full h-full flex flex-col items-center justify-center">
                                <i data-lucide="construction" class="mx-auto mb-4 opacity-50 text-slate-400" size="48"></i>

                            </div>
                        `;
                        lucide.createIcons();
                    }

                    stage.classList.remove('fade-out');
                    
                }, 400); // 400ms matches the CSS transition time
            }
        };

        // Initialize Core Engine on page load
        window.onload = () => {
            Core.navigate('splash');
        };

    </script>
